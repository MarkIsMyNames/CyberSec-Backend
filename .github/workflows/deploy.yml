name: Deploy and Test

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 200.69.13.70
          port: 2206
          username: student
          key: ${{ secrets.VM_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail

            REPO_DIR="/home/student/CyberSec-Backend"
            VENV_DIR="$REPO_DIR/.venv"
            STATE_FILE="/home/student/.cache/securemsg_dep_hash"

            cd "$REPO_DIR"

            PREV_HASH="$(git rev-parse HEAD)"
            git fetch origin main --quiet
            git pull --ff-only origin main --quiet

            [ -f "$VENV_DIR/bin/activate" ] || python3 -m venv "$VENV_DIR"

            DEP_HASH="$(sha256sum "$REPO_DIR/requirements.txt" | cut -d' ' -f1)"
            PREV_DEP_HASH="$(cat "$STATE_FILE" 2>/dev/null || :)"

            if [ "$DEP_HASH" != "$PREV_DEP_HASH" ]; then
              echo "Dependencies changed — reinstalling"
              "$VENV_DIR/bin/pip" install --upgrade pip --quiet
              "$VENV_DIR/bin/pip" install -r "$REPO_DIR/requirements.txt" --quiet
              mkdir -p "$(dirname "$STATE_FILE")"
              echo "$DEP_HASH" > "$STATE_FILE"
            fi

            if sudo systemctl is-active --quiet securemsg; then
              sudo systemctl restart securemsg
            else
              sudo systemctl start securemsg
            fi

            sudo systemctl is-active --quiet securemsg || { echo "securemsg failed to start"; exit 1; }

            for i in $(seq 1 30); do
              if curl -sf https://BobbyTables.theburkenator.com/health > /dev/null 2>&1; then
                echo "Health check passed after $((i * 2))s"
                break
              fi
              [ "$i" -eq 30 ] && { echo "Health check timed out after 60s"; exit 1; }
              sleep 2
            done

            echo "Deployed $(git rev-parse --short HEAD)"

  test:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short
