name: Deploy and Test

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 200.69.13.70
          port: 2206
          username: student
          key: ${{ secrets.VM_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail

            REPO_DIR="$HOME/CyberSec-Backend"
            VENV_DIR="$REPO_DIR/.venv"
            STATE_FILE="$HOME/.cache/securemsg_dep_hash"

            echo "--- git pull"
            cd "$REPO_DIR"
            git fetch origin main --quiet
            git pull --ff-only origin main --quiet

            echo "--- deps"
            DEP_HASH="$(sha256sum "$REPO_DIR/requirements.txt" | cut -d' ' -f1)"
            PREV_DEP_HASH="$(cat "$STATE_FILE" 2>/dev/null || :)"
            if [ "$DEP_HASH" != "$PREV_DEP_HASH" ]; then
              echo "Dependencies changed — reinstalling"
              "$VENV_DIR/bin/pip" install --upgrade pip --quiet
              "$VENV_DIR/bin/pip" install -r "$REPO_DIR/requirements.txt" --quiet
              mkdir -p "$(dirname "$STATE_FILE")"
              echo "$DEP_HASH" > "$STATE_FILE"
            fi

            echo "--- restart"
            sudo systemctl restart securemsg
            sleep 3
            sudo systemctl is-active --quiet securemsg || {
              sudo journalctl -u securemsg -n 100 --no-pager
              exit 1
            }

            for i in $(seq 1 30); do
              curl -sf https://BobbyTables.theburkenator.com/health > /dev/null 2>&1 && {
                echo "Health check passed after $((i * 2))s"
                break
              }
              [ "$i" -eq 30 ] && {
                sudo journalctl -u securemsg -n 50 --no-pager
                exit 1
              }
              sleep 2
            done

            echo "Deployed $(git rev-parse --short HEAD)"

  test:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short
