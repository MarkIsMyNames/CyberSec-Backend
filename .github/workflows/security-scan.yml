name: Security Scan
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install bandit
      - run: bandit -r app/ -x app/security_tests/,app/auth/test_,app/api/test_,app/models/test_,app/schemas/test_,app/crypto/test_,app/middleware/test_,app/test_
