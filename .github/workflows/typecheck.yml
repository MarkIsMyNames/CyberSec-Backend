name: Type Check
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install liboqs
        run: sudo apt-get update && sudo apt-get install -y liboqs-dev
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: mypy --strict app/
