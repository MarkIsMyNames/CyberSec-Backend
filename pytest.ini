[pytest]
testpaths = app
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
filterwarnings =
    error::DeprecationWarning
    error::PendingDeprecationWarning
    # pytest-asyncio uses asyncio.iscoroutinefunction which Python 3.14 deprecated;
    # this is an upstream bug — remove this ignore once pytest-asyncio fixes it
    ignore:'asyncio.iscoroutinefunction' is deprecated:DeprecationWarning
